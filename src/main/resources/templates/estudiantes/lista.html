<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Estudiantes - Roller Speed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-people"></i> Estudiantes Inscritos</h2>
            <a th:href="@{/registro/estudiante}" class="btn btn-primary">
                <i class="bi bi-person-plus"></i> Nuevo Estudiante
            </a>
        </div>

        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Fecha Nacimiento</th>
                    <th>Medio de Pago</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="estudiante : ${estudiantes}">
                    <td th:text="${estudiante.id}"></td>
                    <td th:text="${estudiante.nombre}"></td>
                    <td th:text="${estudiante.email}"></td>
                    <td th:text="${estudiante.fechaNacimiento}"></td>
                    <td th:text="${estudiante.medioPago}"></td>
                </tr>
                <!-- Mensaje si no hay estudiantes -->
                <tr th:if="${#lists.isEmpty(estudiantes)}">
                    <td colspan="5" class="text-center text-muted">No hay estudiantes registrados aún.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
