<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inscripción Instructor - Roller Speed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container mt-5" style="max-width: 600px;">
        <h2 class="mb-4 text-success"><i class="bi bi-person-badge"></i> Registro de Instructor</h2>
        <form>
            <div class="mb-3">
                <label class="form-label">Nombre del Instructor</label>
                <input type="text" class="form-control" placeholder="Nombre completo" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Especialidad</label>
                <input type="text" class="form-control" placeholder="Ej: Velocidad, Artístico, Recreativo">
            </div>
            <div class="mb-3">
                <label class="form-label">Años de Experiencia</label>
                <input type="number" class="form-control" min="0">
            </div>
            <div class="mb-3">
                <label class="form-label">Correo Electrónico</label>
                <input type="email" class="form-control" placeholder="instructor@ejemplo.com">
            </div>
            <button type="submit" class="btn btn-success">
                <i class="bi bi-check-circle"></i> Registrar Instructor
            </button>
        </form>
    </div>

    <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
