<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inscripción Estudiante - Roller Speed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container mt-5" style="max-width: 600px;">
        <h2 class="mb-4"><i class="bi bi-person-plus"></i> Inscripción de Estudiante</h2>
        <form th:action="@{/estudiantes/guardar}" th:object="${estudiante}" method="post">
            <div class="mb-3">
                <label class="form-label">Nombre Completo</label>
                <input type="text" class="form-control" th:field="*{nombre}" placeholder="Ingrese nombre completo" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Correo Electrónico</label>
                <input type="email" class="form-control" th:field="*{email}" placeholder="nombre@ejemplo.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Fecha de Nacimiento</label>
                <input type="date" class="form-control" th:field="*{fechaNacimiento}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Medio de Pago</label>
                <select class="form-select" th:field="*{medioPago}" required>
                    <option value="">Seleccione...</option>
                    <option value="Efectivo">Efectivo</option>
                    <option value="Transferencia">Transferencia</option>
                    <option value="Tarjeta">Tarjeta</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-circle"></i> Registrarme
            </button>
        </form>
    </div>

    <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
