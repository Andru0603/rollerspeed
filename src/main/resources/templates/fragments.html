<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>

    <!-- ======================================== -->
    <!-- FRAGMENTO: NAVBAR PRINCIPAL              -->
    <!-- ======================================== -->
    <div th:fragment="navbar">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                
                <!-- Logo / Marca -->
                <a class="navbar-brand" th:href="@{/}">
                    <i class="bi bi-speedometer2"></i> Roller Speed
                </a>
                
                <!-- Botón hamburguesa (responsive) -->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                
                <!-- Menú de opciones -->
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        
                        <!-- Inicio -->
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/}">Inicio</a>
                        </li>

                        <!-- Misión -->
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/mision#mision}">Misión</a>
                        </li>

                        <!-- Visión -->
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/mision#vision}">Visión</a>
                        </li>

                        <!-- Valores -->
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/mision#valores}">Valores</a>
                        </li>

                        <!-- Servicios -->
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/servicios}">Servicios</a>
                        </li>

                        <!-- Eventos -->
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/eventos}">Eventos</a>
                        </li>

                    </ul>
                </div>
            </div>
        </nav>
    </div>

    <!-- ======================================== -->
    <!-- FRAGMENTO: SCRIPTS DE BOOTSTRAP          -->
    <!-- ======================================== -->
    <div th:fragment="scripts">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </div>

</body>
</html>
